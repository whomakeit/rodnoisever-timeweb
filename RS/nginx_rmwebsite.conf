# Nginx snippet for serving this Readymag export from:
# https://e-plus.media/specprojects/rodnoysever/
#
# Merge these locations into the existing e-plus.media server block.
# Files should be uploaded to:
# /path/to/webroot/specprojects/rodnoysever/

location = /specprojects/rodnoysever/index.html {
  root /path/to/webroot;
  expires -1;
  add_header Cache-Control "no-cache";
}

location ~* ^/specprojects/rodnoysever/.+\.(?:css|js|mjs|jpg|jpeg|png|gif|svg|ico|webp|woff2?|ttf|otf)$ {
  root /path/to/webroot;
  expires 1y;
  add_header Cache-Control "public, max-age=31536000, immutable";
  try_files $uri =404;
}

location /specprojects/rodnoysever/ {
  root /path/to/webroot;
  index index.html;

  if ($args ~ "_escaped_fragment_") {
    rewrite ^/specprojects/rodnoysever/(.+)/$ /specprojects/rodnoysever/snippets/$1.html last;
    rewrite ^/specprojects/rodnoysever/([.a-zA-Z0-9-_/]+)$ /specprojects/rodnoysever/snippets/$1.html last;
    rewrite ^/specprojects/rodnoysever/ /specprojects/rodnoysever/snippets/1.html last;
  }

  try_files $uri $uri/ /specprojects/rodnoysever/index.html;
}
