# Nginx snippet for serving this Readymag export from:
# https://e-plus.media/specprojects/rodnoysever/
#
# Merge these locations into the existing e-plus.media server block.
# Files should be uploaded to:
# /path/to/webroot/specprojects/rodnoysever/
#
# Optional, but recommended at server/http level:
# gzip on;
# gzip_vary on;
# gzip_min_length 1024;
# gzip_comp_level 5;
# gzip_types text/plain text/css text/xml application/xml application/json application/javascript application/rss+xml image/svg+xml;
#
# If ngx_brotli is installed:
# brotli on;
# brotli_comp_level 5;
# brotli_types text/plain text/css text/xml application/xml application/json application/javascript application/rss+xml image/svg+xml;
#
# If precompressed .gz/.br files are deployed and the modules are available:
# gzip_static on;
# brotli_static on;

location = /specprojects/rodnoysever/index.html {
  root /path/to/webroot;
  expires -1;
  add_header Cache-Control "no-cache";
}

location ~* ^/specprojects/rodnoysever/.+\.(?:css|js|mjs|jpg|jpeg|png|gif|svg|ico|webp|avif|woff2?|ttf|otf)$ {
  root /path/to/webroot;
  expires 1y;
  add_header Cache-Control "public, max-age=31536000, immutable";
  try_files $uri =404;
}

location /specprojects/rodnoysever/ {
  root /path/to/webroot;
  index index.html;

  if ($args ~ "_escaped_fragment_") {
    rewrite ^/specprojects/rodnoysever/(.+)/$ /specprojects/rodnoysever/snippets/$1.html last;
    rewrite ^/specprojects/rodnoysever/([.a-zA-Z0-9-_/]+)$ /specprojects/rodnoysever/snippets/$1.html last;
    rewrite ^/specprojects/rodnoysever/ /specprojects/rodnoysever/snippets/1.html last;
  }

  try_files $uri $uri/ /specprojects/rodnoysever/index.html;
}
