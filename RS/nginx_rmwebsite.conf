
server {
  listen 80;
  server_name whmkst.com;

  root "/path/to/project_folder"; # Change path to folder with downloaded source
  index index.html;

  access_log off;
  autoindex off;
  charset utf-8;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|svg|ico|webp|woff2?|ttf|otf)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache";
  }

  location / {
    if (-f $request_filename ) {
      break;
    }

    if ($args ~ "_escaped_fragment_") {
      rewrite ^/(.+)/$ /snippets/$1.html last;
      rewrite ^/([.a-zA-Z0-9-_/]+)$ /snippets/$1.html last;
      rewrite ^/ /snippets/1.html last;
    }

    location = / {
      if ($args ~ "_escaped_fragment_") {
        rewrite ^/ /snippets/1.html last;
      }

      
    }

    rewrite ^/?$ /index.html last;
    rewrite ^/[.a-zA-Z0-9-_]+(/(.*))? /$2 last;

    try_files $uri $uri/;
  }
}
